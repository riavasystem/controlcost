name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend-test:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: controlcost
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: controlcost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://controlcost:testpassword@localhost:5432/controlcost_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-min-32-characters-long
          FRONTEND_URL: http://localhost:3000
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=60 -v

  frontend-build:
    name: Frontend — lint + type check + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          API_URL: http://127.0.0.1:8000
        run: npm run build
